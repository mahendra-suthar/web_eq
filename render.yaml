services:

  # =========================
  # FastAPI Backend
  # =========================
  - type: web
    name: web-eq-backend
    runtime: python
    rootDir: web-eq-server
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: web-eq-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SAMESITE
        value: none
      - key: ISSECURE
        value: "true"

  # =========================
  # Admin Frontend
  # =========================
