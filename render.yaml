databases:
  - name: web-eq-db
    databaseName: web_eq_db
    plan: free

services:

  # =========================
  # FastAPI Backend
  # =========================
  - type: web
    name: web-eq-backend
    runtime: python
    rootDir: web-eq-server

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2

    healthCheckPath: /healthz

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

      - key: DATABASE_URL
        fromDatabase:
          name: web-eq-db
          property: connectionString

      - key: SECRET_KEY
        generateValue: true

      - key: REDIS_URL
        sync: false

      - key: CORS_ORIGINS
        sync: false


  # =========================
  # Admin Frontend
  # =========================
  - type: web
    name: web-eq-admin
    runtime: static
    rootDir: web-eq-client

    buildCommand: |
      npm ci
      npm run build

    staticPublishPath: build

    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      - key: VITE_API_URL
        sync: false

    routes:
      - type: rewrite
        source: /*
        destination: /index.html


  # =========================
  # Customer Frontend
  # =========================
  - type: web
    name: web-eq-customer
    runtime: static
    rootDir: web-eq-customer

    buildCommand: |
      npm ci
      npm run build

    staticPublishPath: dist

    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      - key: VITE_API_URL
        sync: false

    routes:
      - type: rewrite
        source: /*
        destination: /index.html